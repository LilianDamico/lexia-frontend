# render.yaml — Frontend LexIA (Angular Static Site)
# Documentação: https://render.com/docs/blueprint-spec

services:

  # ── Frontend Angular (Static Site) ─────────────────────────────────────────
  - type: web
    name: lexia-frontend
    runtime: static
    buildCommand: node scripts/set-env.js && npm ci && npm run build -- --configuration production
    staticPublishPath: dist/lexia-frontend/browser
    autoDeploy: true
    domains:
      - lexiaadv.com
      - www.lexiaadv.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    headers:
      - path: /*
        name: X-Frame-Options
        value: DENY
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
      - path: /*
        name: Referrer-Policy
        value: strict-origin-when-cross-origin
      - path: /assets/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: LEXIA_API_URL
        value: https://api.lexiaadv.com/api/v1
